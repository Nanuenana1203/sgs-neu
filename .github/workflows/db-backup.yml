name: Tägliches Datenbank-Backup

on:
  schedule:
    # Täglich um 03:00 UTC (= 04:00 MEZ / 05:00 MESZ)
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Ermöglicht manuellen Start über GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: PostgreSQL Client installieren
        run: sudo apt-get install -y postgresql-client

      - name: Datenbank dumpen
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          STAMP=$(date +%Y%m%d-%H%M%S)
          pg_dump "postgresql://postgres.rxprumwtuijmpohuunun@aws-0-eu-west-1.pooler.supabase.com:5432/postgres" \
            --no-owner --no-acl \
            -f "sgs-db-$STAMP.sql"
          gzip "sgs-db-$STAMP.sql"

      - name: Backup als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: sgs-db-backup-${{ github.run_number }}
          path: "*.sql.gz"
          retention-days: 90

name: Tägliches Datenbank-Backup

on:
  schedule:
    # Täglich um 03:00 UTC (= 04:00 MEZ / 05:00 MESZ)
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Ermöglicht manuellen Start über GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: PostgreSQL Client installieren
        run: sudo apt-get install -y postgresql-client

      - name: Datenbank dumpen
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          STAMP=$(date +%Y%m%d-%H%M%S)
          # IPv4-Adresse auflösen (GitHub Actions hat IPv6-Probleme mit Supabase)
          DB_IP=$(dig +short A db.rxprumwtuijmpohuunun.supabase.co | head -1)
          echo "Verbinde mit $DB_IP"
          pg_dump \
            -h "$DB_IP" \
            -p 5432 \
            -U postgres \
            -d postgres \
            --no-owner --no-acl \
            -f "sgs-db-$STAMP.sql"
          gzip "sgs-db-$STAMP.sql"

      - name: Backup als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: sgs-db-backup-${{ github.run_number }}
          path: "*.sql.gz"
          retention-days: 90

name: Tägliches Datenbank-Backup

on:
  schedule:
    # Täglich um 03:00 UTC (= 04:00 MEZ / 05:00 MESZ)
    - cron: "0 3 * * *"
  workflow_dispatch:
    # Ermöglicht manuellen Start über GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Datenbank exportieren
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node scripts/db-backup-api.mjs
          ls -lh db-backups/

      - name: Backup als Artefakt speichern
        uses: actions/upload-artifact@v4
        with:
          name: sgs-db-backup-${{ github.run_number }}
          path: db-backups/*.json
          retention-days: 90
